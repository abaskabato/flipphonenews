<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icon.svg">
    <title>FlipPhone — News, Chat & Games</title>
    <meta name="description" content="A 3D flip phone with live Hacker News headlines, Nostr chat, snake, retro SMS, and more. No accounts, no tracking.">
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
    {
        "imports": {
            "three": "./vendor/three.module.js",
            "three/addons/": "./vendor/addons/",
            "nostr-tools": "https://esm.sh/nostr-tools@2.10.4"
        }
    }
    </script>
</head>
    <body>
    <!-- sticky site header -->
    <header class="site-header">
        <a class="brand" href="/">FLIP&shy;PHONE</a>
        <nav class="site-nav">
            <a href="https://github.com/permissionlesstech/bitchat" target="_blank" rel="noopener">Bitchat</a>
            <a class="ghost" href="/sponsor.html">Sponsor</a>
        </nav>
    </header>

    <!-- ===== HERO: full-screen 3D flip phone ===== -->
    <section class="hero">
        <canvas id="scene"></canvas>

        <div class="hero-copy">
            <p class="eyebrow">Live News · Chat · Games</p>
            <h1>A flip phone for the open web.</h1>
            <p class="sub">
                Live HN headlines, location-based chat, snake, retro SMS & more.
                All inside a 3D flip phone. No accounts, no tracking.
            </p>
            <p class="microcopy">Drag to spin · tap to flip · type on the phone</p>
        </div>

        <div class="hero-controls">
            <nav class="tabs">
                <button class="tab active" data-app="news">📰 News</button>
                <button class="tab" data-app="chat">💬 Chat</button>
                <button class="tab" data-app="snake">🐍 Snake</button>
                <button class="tab" data-app="texts">💌 Texts</button>
                <button class="tab" data-app="shop">🛒 Shop</button>
            </nav>
            <button id="flipBtn" class="flip-btn"><span class="dot"></span> Open / Close</button>
        </div>

        <div id="sponsorTag" class="sponsor-tag" hidden></div>
        <div id="loader" class="loader">Booting handset…</div>
    </section>

    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/site.js"></script>
</body>
</html>
