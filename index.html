<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icon.svg">
    <title>DEAD DROP — leave a message where you stand</title>
    <meta name="description" content="A 3D flip phone that buries anonymous messages at real places. Reading what strangers left is free. Leave your own — for the next person, or sealed until a future date.">
    <meta property="og:title" content="DEAD DROP">
    <meta property="og:description" content="Leave a message buried where you stand. Read what strangers left here. Seal a note for the future.">
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
    {
        "imports": {
            "three": "./vendor/three.module.js",
            "three/addons/": "./vendor/addons/"
        }
    }
    </script>
</head>
    <body>
    <header class="site-header">
        <a class="brand" href="/">DEAD<span>DROP</span></a>
        <nav class="site-nav">
            <a class="ghost" href="#how">How it works</a>
        </nav>
    </header>

    <!-- ===== full-screen 3D flip phone ===== -->
    <section class="hero">
        <canvas id="scene"></canvas>

        <div class="hero-copy">
            <p class="eyebrow">Anonymous · location-pinned</p>
            <h1>Leave a message where you stand.</h1>
            <p class="sub">
                Bury a note at this exact place for whoever comes next —
                or seal it until a future date. Reading is free. Leaving one costs a buck.
            </p>
            <p class="microcopy">Drag to spin · tap to flip · type on the phone</p>
        </div>

        <div class="hero-controls">
            <div class="dpad">
                <button id="upBtn" class="key" aria-label="up">▲</button>
                <div class="dpad-mid">
                    <button id="backBtn" class="key" aria-label="back">‹</button>
                    <button id="okBtn" class="key ok" aria-label="ok">OK</button>
                    <button id="downBtn" class="key" aria-label="down">▼</button>
                </div>
            </div>
            <div class="actions">
                <button id="leaveBtn" class="btn primary">✚ Leave a drop</button>
                <button id="flipBtn" class="flip-btn"><span class="dot"></span> Open / Close</button>
            </div>
        </div>

        <div id="loader" class="loader">Tuning in…</div>
    </section>

    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/site.js"></script>
</body>
</html>
