<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip Phone News</title>
    <meta name="description" content="A live, interactive 3D flip phone: stream the day's headlines, text like it's 2003, and challenge friends to Snake.">
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
    {
        "imports": {
            "three": "./vendor/three.module.js",
            "three/addons/": "./vendor/addons/"
        }
    }
    </script>
</head>
<body>
    <div id="app">
        <canvas id="scene"></canvas>

        <header class="topbar">
            <div class="brand">FLIP&shy;PHONE<span>NEWS</span></div>
            <a class="sponsor-link" href="/sponsor.html">Advertise here &rarr;</a>
        </header>

        <!-- mode tabs -->
        <nav class="tabs">
            <button class="tab active" data-app="news">📰 News</button>
            <button class="tab" data-app="texts">📟 Texts</button>
            <button class="tab" data-app="snake">🐍 Snake</button>
        </nav>

        <!-- TEXTS composer -->
        <section id="panel-texts" class="panel" hidden>
            <h3>Text from 2003</h3>
            <label>Contact</label>
            <input id="tx-contact" type="text" value="CRUSH ♥" maxlength="16">
            <div class="row presets">
                <button class="tx-preset" data-preset="Crush">Crush</button>
                <button class="tx-preset" data-preset="Mom">Mom</button>
                <button class="tx-preset" data-preset="Nokia">Nokia</button>
                <button class="tx-preset" data-preset="Y2K">Y2K</button>
            </div>
            <label>Add a message</label>
            <input id="tx-msg" type="text" placeholder="type… (Enter = from you)">
            <div class="row">
                <button id="tx-add-them">+ Them</button>
                <button id="tx-add-me">+ You</button>
                <button id="tx-undo" class="ghost">Undo</button>
                <button id="tx-clear" class="ghost">Clear</button>
            </div>
            <div class="row">
                <button id="tx-save" class="primary">📸 Save image</button>
                <button id="tx-share" class="primary">🔗 Share thread</button>
            </div>
            <p id="tx-sharemsg" class="note">Flip the phone shut to “send” it.</p>
        </section>

        <!-- SNAKE -->
        <section id="panel-snake" class="panel" hidden>
            <h3>Snake</h3>
            <button id="sn-start" class="primary wide">▶ Start / Restart</button>
            <div class="dpad">
                <button id="sn-up">▲</button>
                <button id="sn-left">◀</button>
                <button id="sn-right">▶</button>
                <button id="sn-down">▼</button>
            </div>
            <p class="note">Arrow keys or WASD also work.</p>
            <label>Your name (for the challenge)</label>
            <input id="sn-name" type="text" placeholder="optional" maxlength="16">
            <button id="sn-challenge" class="primary wide">⚔️ Challenge a friend</button>
            <p id="sn-share" class="note">Beat a score, then share the exact same board.</p>
            <p id="sn-status" class="status"></p>
        </section>

        <div class="hud">
            <button id="flipBtn" class="flip-btn" aria-label="Open or close the phone">
                <span class="dot"></span> Open / Close
            </button>
            <p class="tip">drag to rotate &middot; scroll to zoom</p>
        </div>

        <div id="sponsorTag" class="sponsor-tag" hidden></div>

        <div id="loader" class="loader">Booting handset&hellip;</div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
