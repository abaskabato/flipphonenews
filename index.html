<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip Phone News</title>
    <meta name="description" content="A live, interactive 3D flip phone that streams the day's top tech headlines on its tiny screen.">
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
    {
        "imports": {
            "three": "./vendor/three.module.js",
            "three/addons/": "./vendor/addons/"
        }
    }
    </script>
</head>
<body>
    <div id="app">
        <canvas id="scene"></canvas>

        <header class="topbar">
            <div class="brand">FLIP&shy;PHONE<span>NEWS</span></div>
            <a class="sponsor-link" href="/sponsor.html">Advertise here &rarr;</a>
        </header>

        <div class="hud">
            <button id="flipBtn" class="flip-btn" aria-label="Open or close the phone">
                <span class="dot"></span> Open / Close
            </button>
            <p class="tip">drag to rotate &middot; scroll to zoom</p>
        </div>

        <div id="sponsorTag" class="sponsor-tag" hidden></div>

        <div id="loader" class="loader">Booting handset&hellip;</div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
