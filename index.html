<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icon.svg">
    <title>FLIPCAST — flip it open, tune the world</title>
    <meta name="description" content="A 3D flip phone that tunes thousands of live radio stations and podcasts from around the world. No accounts, no signup — just flip it open and press play.">
    <meta property="og:title" content="FLIPCAST">
    <meta property="og:description" content="Live radio + podcasts from around the world, on a 3D flip phone.">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#06060d">
    <script type="importmap">
    {
        "imports": {
            "three": "./vendor/three.module.js",
            "three/addons/": "./vendor/addons/"
        }
    }
    </script>
</head>
    <body>
    <header class="site-header">
        <div class="header-left">
            <a class="brand" href="/"><img class="brand-mark" src="/icon.svg" alt="" width="24" height="24">FLIP<span>CAST</span></a>
            <div class="hero-copy">
                <p class="eyebrow">Live · worldwide · free</p>
                <h1>Flip it open. Tune the world.</h1>
            </div>
        </div>
        <div class="header-right">
            <div id="newsletter" class="newsletter-hdr">
                <button id="newsletterToggle" class="nl-btn" aria-expanded="false">
                    <span>📡</span>
                    <span class="nl-label">Signal</span>
                </button>
                <form id="newsletterForm" class="nl-form">
                    <p class="nl-pitch">One email a week on living with less screen. Flip phones, dumb phone tips, and the art of disconnecting.</p>
                    <input
                        type="email"
                        name="email"
                        placeholder="your@email.com"
                        required
                        autocomplete="email"
                        class="nl-input"
                    />
                    <button type="submit" class="nl-submit">Subscribe</button>
                    <p class="nl-hint">No spam. Unsubscribe anytime.</p>
                </form>
            </div>
            <a class="credit" href="https://abaskabato.github.io/aboutme/" target="_blank" rel="noopener">Made with ♥ in Seattle by abas</a>
        </div>

    <!-- ===== full-screen 3D flip phone ===== -->
    <section class="hero">
        <canvas id="scene"></canvas>

        <div class="band-toggle" role="tablist" aria-label="listening band">
            <span class="band-slider" aria-hidden="true"></span>
            <button id="bandRadio" class="band on" role="tab" aria-pressed="true">📻 Radio</button>
            <button id="bandPods" class="band" role="tab" aria-pressed="false">🎙 Podcasts</button>
        </div>
        <div class="hero-controls">
            <div class="actions">
                <button id="searchBtn" class="btn primary">🔍 Search</button>
                <button id="shareBtn" class="flip-btn" title="Copy a link to what's playing">🔗 Share</button>
                <button id="stickBtn" class="flip-btn" title="Pin the phone in place">📌 Pin</button>
                <button id="flipBtn" class="flip-btn"><span class="dot"></span> Open / Close</button>
            </div>
        </div>

        <div id="loader" class="loader">
            <div class="loader-dots"><span></span><span></span><span></span></div>
            <div>Warming up the tubes</div>
        </div>
    </section>

    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/site.js"></script>
</body>
</html>
